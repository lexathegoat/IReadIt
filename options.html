<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>IReadIt - Settings</title>
<link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="wrap">
    <div class="header">
      <span class="brand-mark"></span>
      <h1>IReadIt · Settings</h1>
    </div>

    <label for="apiKeyInput">Anthropic API Key</label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off" />

    <p class="hint">
      Your API key is stored only on this device in your browser
      (<code>chrome.storage.local</code>) and is sent directly to the Anthropic API during analysis.
      It is not shared with any server other than Anthropic.
      You can get your API key from
      <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>.
    </p>

    <div class="row">
      <button id="saveBtn" class="primary-btn">Save</button>
      <button id="clearBtn" class="secondary-btn">Remove Key</button>
    </div>

    <p id="statusMsg" class="status"></p>
  </div>

  <script src="options.js"></script>
</body>
</html>
